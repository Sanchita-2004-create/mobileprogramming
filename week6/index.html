<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Form</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #f7f7f5; padding: 2rem; }
    .card { background: #fff; border: 1px solid #e8e8e8; border-radius: 16px; padding: 2rem; width: 100%; max-width: 460px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #1D9E75; display: inline-block; margin-right: 8px; }
    h2 { font-size: 20px; font-weight: 600; margin-bottom: 4px; display: flex; align-items: center; }
    .subtitle { font-size: 13px; color: #888; margin-bottom: 2rem; margin-left: 16px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .field { margin-bottom: 1.2rem; }
    label { display: block; font-size: 11px; font-weight: 600; color: #999; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px; }
    input, textarea { width: 100%; padding: 10px 12px; background: #f7f7f5; border: 1px solid #e8e8e8; border-radius: 8px; font-size: 14px; font-family: Arial, sans-serif; outline: none; transition: border-color 0.15s; color: #222; }
    input:focus, textarea:focus { border-color: #aaa; background: #fff; }
    textarea { resize: vertical; min-height: 100px; line-height: 1.6; }
    button { width: 100%; padding: 12px; background: #222; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 0.25rem; transition: opacity 0.15s; }
    button:hover { opacity: 0.8; }
    #status { margin-top: 12px; font-size: 13px; text-align: center; min-height: 18px; }
  </style>
</head>
<body>
  <div class="card">
    <h2><span class="dot"></span>Get in touch</h2>
    <p class="subtitle">We'll get back to you as soon as possible.</p>

    <div class="row">
      <div class="field">
        <label>First name</label>
        <input type="text" id="fname" placeholder="Enter" />
      </div>
      <div class="field">
        <label>Last name</label>
        <input type="text" id="lname" placeholder="Enter" />
      </div>
    </div>

    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="name@example.com" />
    </div>

    <div class="field">
      <label>Subject</label>
      <input type="text" id="subject" placeholder="How can we help?" />
    </div>

    <div class="field">
      <label>Message</label>
      <textarea id="message" placeholder="Tell us more..."></textarea>
    </div>

    <button onclick="submitForm()">Send message</button>
    <p id="status"></p>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
