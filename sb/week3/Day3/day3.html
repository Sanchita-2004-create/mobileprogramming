<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile Card Interaction</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="script.js" defer></script>   
</head>
<body>

    <div id="profile-card">
        <h2 id="student-name">Student Name</h2>
        <div id="student-bio"><b>IT Student</b> learning jQuery</div>
        
        <img id="profile-photo" src="https://dummyimage.com/100x100/000/fff.png&text=Photo" alt="Profile Photo">
        <ul id="skills-list">
            <li>HTML</li>
            <li>CSS</li>
            <li>JavaScript</li>
        </ul>
    </div>

    <input type="text" id="nickname-input" placeholder="Enter nickname">


    <!-- GET & SET -->
    <div class="section">
    <h3> GET  SET </h3>
    <button id="show-name">Show Name</button>
    <button id="change-name">Change Name</button>
    <button id="show-bio">Show Bio</button>
    <button id="get-input">Get Input</button>
    <button id="set-input">Set Input</button>
    </div>


    <!-- CSS CLASSES -->
    <div class="section">
    <h3> CSS CLASSES </h3>
    <button id="highlight-card">Highlight Card</button>
    <button id="remove-highlight">Remove Highlight</button>
    <button id="toggle-dark-mode">Toggle Dark Mode</button>
    <button id="toggle-rounded">Toggle Rounded</button>
    </div>


    <!-- CSS -->
    <div class="section">
    <h3> CSS </h3>
    <button id="red-bg">Red Background</button>
    <button id="reset-bg">Reset Background</button>
    </div>

    <!-- HIDE & SHOW -->
    <div class="section">
    <h3> HIDE AND SHOW </h3>
    <button id="hide-photo">Hide Photo</button>
    <button id="show-photo">Show Photo</button>
    <button id="toggle-bio">Toggle Bio</button>
    </div>

    <!-- FADE -->
    <div class="section">
    <h3> FADE </h3>
    <button id="fade-out-card">Fade Out Card</button>
    <button id="fade-in-card">Fade In Card</button>
    <button id="fade-to-50">Fade to 50%</button>
    </div>

    <!-- SLIDE -->
    <div class="section">
    <h3> SLIDE </h3>
    <button id="slide-up-skills">Slide Up Skills</button>
    <button id="slide-down-skills">Slide Down Skills</button>
    <button id="slide-toggle-skills">Slide Toggle Skills</button>
    </div>

    <!-- ANIMATE -->
    <div class="section">
    <h3> ANIMATE </h3>
    <button id="animate-card">Animate Card</button>
    </div>

    <!-- Output box -->
    <div class="section">
    <h3> OUTPUT BOX </h3>
    <div id="output" style="margin-top:20px; font-weight:bold;"></div>
    </div>

</body>
</html>
