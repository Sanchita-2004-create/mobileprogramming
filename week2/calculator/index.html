<!-- Create a program that:
1.Take two numbers from input fields.
2.Have 4 buttons (Add, Subtract, Multiply, Divide)
3.Clicking on Add should add two numbers and show the result.
4.Clicking on Subtract should subtract it and same goes for multiply and divide.
5. You need to use if else (control statements) for this.]-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
        }

        input {
            display: block;
            margin: 10px auto;
            padding: 8px;
            width: 200px;
        }

        .buttons {
            margin-top: 10px;
        }

        button {
            margin: 5px;
            padding: 8px 12px;
            border: 1px solid black;
            background: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #f0f0f0;
        }

        #result {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h2>Calculator</h2>

    <input type="number" id="num1" placeholder="Number 1">
    <input type="number" id="num2" placeholder="Number 2">

    <div class="buttons">
        <button onclick="calculate('+')">+</button>
        <button onclick="calculate('-')">−</button>
        <button onclick="calculate('*')">×</button>
        <button onclick="calculate('/')">÷</button>
    </div>

    <h3 id="result">Result:</h3>

    <script src="script.js"></script>

</body>
</html>
