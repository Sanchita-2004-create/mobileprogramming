<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Page with Images</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

/* NAVBAR */
nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 30px;
  background: #111;
  color: white;
  position: relative;
}

.logo {
  font-size: 20px;
  font-weight: bold;
}

nav ul {
  display: flex;
  list-style: none;
}

nav ul li {
  margin-left: 25px;
}

nav a {
  color: white;
  text-decoration: none;
}

/* HAMBURGER */
.menu-toggle {
  display: none;
  font-size: 28px;
  cursor: pointer;
}

/* IMAGE SECTION */
.gallery {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 15px;
  padding: 40px;
}

.gallery img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  border-radius: 10px;
}


/* MOBILE */
@media (max-width: 768px) {

  .menu-toggle {
    display: block;
  }

  nav ul {
    display: none;
    flex-direction: column;
    background: #111;
    width: 100%;
    position: absolute;
    top: 60px;
    left: 0;
  }

  nav ul.active {
    display: flex;
  }

  nav ul li {
    text-align: center;
    padding: 12px 0;
  }

  .gallery {
    grid-template-columns: 1fr;
  }
}

/* TABLET */
@media (min-width: 769px) and (max-width: 1024px) {
  .gallery {
    grid-template-columns: repeat(2, 1fr);
  }
}

/* DESKTOP */
@media (min-width: 1025px) {
  .gallery {
    grid-template-columns: repeat(4, 1fr);
  }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
  <div class="logo">My Website</div>

  <div class="menu-toggle" onclick="toggleMenu()">☰</div>

  <ul id="menu">
    <li><a href="#">Home</a></li>
    <li><a href="#">Services</a></li>
    <li><a href="#">Contact</a></li>
  </ul>
</nav>

<!-- IMAGE GALLERY -->
<div class="gallery">
  <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=800" alt="">
  <img src="https://images.unsplash.com/photo-1518770660439-4636190af475?w=800" alt="">
  <img src="https://images.unsplash.com/photo-1499346030926-9a72daac6c63?w=800" alt="">
  <img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?w=800" alt="">
</div>

<script>
function toggleMenu() {
  document.getElementById("menu").classList.toggle("active");
}
</script>

</body>
</html>
