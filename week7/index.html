<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Page</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 30px;
  background: #111;
  color: white;
  position: relative;
}

.logo {
  font-size: 20px;
  font-weight: bold;
}

nav ul {
  display: flex;
  list-style: none;
}

nav ul li {
  margin-left: 25px;
}

nav a {
  color: white;
  text-decoration: none;
}


.menu-toggle {
  display: none;
  font-size: 28px;
  cursor: pointer;
}


.main {
  padding: 40px;
  text-align: center;
}


@media (max-width: 768px) {

  .menu-toggle {
    display: block;
  }

  nav ul {
    display: none;
    flex-direction: column;
    background: #111;
    width: 100%;
    position: absolute;
    top: 60px;
    left: 0;
  }

  nav ul.active {
    display: flex;
  }

  nav ul li {
    text-align: center;
    padding: 12px 0;
  }
}

@media (min-width: 769px) and (max-width: 1024px) {
  .main {
    padding: 30px;
  }
}

@media (min-width: 1025px) {
  .main {
    max-width: 1000px;
    margin: auto;
  }
}

</style>
</head>

<body>

<nav>
  <div class="logo">My Website</div>

  <div class="menu-toggle" onclick="toggleMenu()">☰</div>

  <ul id="menu">
    <li><a href="#">Home</a></li>
    <li><a href="#">Services</a></li>
    <li><a href="#">Contact</a></li>
  </ul>
</nav>


<div class="main">
  <h2>Welcome</h2>
</div>

<script>
function toggleMenu() {
  document.getElementById("menu").classList.toggle("active");
}
</script>

</body>
</html>
